      #     - run: npm run lint
      #     - run: npm test
      #
      #   Python:
      #     - uses: actions/setup-python@v5
      #       with: { python-version: "3.12" }
      #     - run: pip install -r requirements.txt
      #     - run: ruff check .
      #     - run: pytest
      #
      #   Go:
      #     - uses: actions/setup-go@v5
      #       with: { go-version: "1.22" }
      #     - run: go vet ./...
      #     - run: go test ./...
      # -------------------------------------------------------------------------
      - name: Install dependencies
        run: |
          echo "TODO - install your project's dependencies"

      - name: Lint
        run: |
          echo "TODO - run your linter (warnings = errors is a good default)"

